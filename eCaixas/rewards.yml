Recompensas:
  Reco1:
    # Nome que aparecerá nas mensagens
    Name: '&aPedra Mística'
    # Item que aparecerá no preview do menu principal.
    Preview:
      Material: 'STONE'
      Name: '&aPedra Mística'
      Amount: 1
      Glow: false
      Lore:
        - ''
        - '&7Esta pedra vale muito dinheiro!'
        - ''
    # Só será dado o item se os comandos estiverem em false.
    # Item que será dado ao jogador.
    Item:
      Material: 'STONE'
      Name: '&aPedra Mística'
      Amount: 1
      Lore:
        - '&aEu valho muito!'
      # ENCHANT:LEVEL
      # Caso não queira deixe:
      # Enchants: []
      Enchants: 
        - 'DURABILITY:1'
    # Mensagens para o jogador que ganhou a recompensa
    Mensagens:
      Actionbar: '&aParabéns, você ganhou uma Pedra Mística na caixa!'
      Title: '&a&lPARABÉNS<nl>&fVocê ganhou uma Pedra Mística'
      Sound: 'LEVEL_UP'
      Chat: ['', '&aParabéns, você ganhou uma Pedra Mística na caixa!', '']
    # Mensagens para todos os outros jogadores, avisando que o jogador ganhou a recompensa
    Mensagens-Publicas:
      Actionbar: '&aO jogador &f{player} &aganhou uma Pedra Mística na caixa!'
      Title: ''
      Sound: 'LEVEL_UP'
      Chat: ['', '&aO jogador &f{player} &aganhou uma Pedra Mística na caixa!', '']
    # Só será executado o comando se o "Use" estiver em true.
    # Comandos que serão executados no jogador.
    Command:
      Use: false
      List:
        - 'give {player} stone 1'
