 reload: '&aConfigurações recarregadas com sucesso.'
 help:
   - ''
   - '&aComandos disponíveis:'
   - ''
   - ' &8> &a/clearplot give <all/jogador> <quantia> &8- &7Da um limpador de plot ao jogador'
   - ' &8> &a/clearplot reload &8- &7Recarrega a configuração do plugin.'
   - ' &8> &a/clearplot help &8- &7Mostra essa menssagem.'
   - ''
 clearplot-give: '&aVocê deu &7{amount}x Limpador de Plot &apara o jogador &7{player}'
