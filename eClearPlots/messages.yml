# Mensagens gerais do plugin

actionbar:
 clearing: '&a&lLIMPADOR: &aStatus -> &8[{progressbar}&8] &7{percentage}%'
 finished: '&a&lLIMPADOR: &aLimpeza concluída.'
  
title:
