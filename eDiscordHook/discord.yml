Embeds:
  vincular:
    Title: 'Pedido de Vinculação de Conta'
    Url: '' # URL clicável no título
    Thumbnail: 'https://minotar.net/helm/{player}/100.png' # URL de imagem pequena (canto superior direito)
    Image: '' # URL de imagem grande (corpo do embed)
    Color: '#00A8FF'
    Author:
      Name: '' # Nome do autor
      Url: '' # URL clicável no nome do autor
      IconUrl: '' # Ícone do autor (imagem pequena ao lado do nome)
    Footer:
      Text: ' {data} às {hora}'
      Image: ''
    Description: 'Para completar a verificação, digite o código a seguir no chat do servidor'
    Timestamp: '' # Use 'now' para timestamp atual, ou deixe vazio
    Fields:
      jogador:
        Inline: true
        Header: 'Jogador'
        Content: '```{player}```'
      codigo:
        Inline: true
        Header: 'Seu Código'
