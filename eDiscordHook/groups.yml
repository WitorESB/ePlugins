#Cargo dado ao vincular o usuário
Vincular:
  # ID do cargo no discord
  ID: ''
  # Sincronizar o nick no discord
  Sincronizar:
    Ativar: false
    Nick: '{player}'

Cargos:
  # nome do grupo
  default:
    # Prioridade, quanto maior melhor
    Ordem: 1
    # ID do cargo no discord
    ID: ''
    # Permissão para receber o cargo
    Permissao: 'ediscordhook.default'
    # Sincronizar o nick no discord
    Sincronizar:
      Ativar: true
      Nick: '[M] {player}'
  vip:
    # Prioridade, quanto maior melhor
    Ordem: 2
    # ID do cargo no discord
    ID: ''
    # Permissão para receber o cargo
    Permissao: 'ediscordhook.vip'
    # Sincronizar o nick no discord
    Sincronizar:
      Ativar: true
      Nick: '[VIP] {player}'
