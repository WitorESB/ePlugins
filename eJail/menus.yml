# Sistema de menus.

# Setas dos menus.
arrows:
  back:
    material: 'ARROW:0'
    name: '&cVoltar'
    lore: ['&7Clique para voltar ao menu anterior.']
  previous:
    material: 'ARROW:0'
    name: '&cAnterior'
    lore: ['&7Clique para ir à página anterior.']
  next:
    material: 'ARROW:0'
    name: '&aPróximo'
    lore: ['&7Clique para ir à próxima página.']

# Menu principal
main:
  name: '&8Presos - Principal'
  size: 45
  slots: [11, 12, 13, 14, 15, 20, 21, 22, 23, 24, 29, 30, 31, 32, 33]
  previous-slot: 18
  next-slot: 26
  empty-slot: 22
  items:
    arrested:
      material: '{player}'
      name: '&a{player}'
      lore:
        - ''
        - '&fTempo da Prisão: &7{time}'
        - '&fTempo Restante: &7{time_left}'
        - '&fMotivo da Prisão: &7{reason}'
        - ''
        - '&8 > &2$&a{money_increase} coins &fp/ Aumentar &8(&f{increase_time}&8)'
        - '&8 > &2$&a{money_release} coins &fp/ Soltar.'
        - ''
        - '&aClique para visualizar opções.'
    empty:
      material: 'WEB'
      name: '&cVazio...'
      lore: [ '&7Nenhum jogador preso :c' ]

# Menu de opções
options:
  name: '&8Presos - Options de {player}'
  size: 27
  back-slot: 9
  release-slot: 12
  increase-slot: 15
  items:
    release:
      material: 'FEATHER'
      name: '&aSoltar'
      lore:
        - ''
        - '&8 > &2$&a{money_release} coins &fp/ soltar.'
        - ''
        - '&aClique para pagar a fiança.'
    release-no:
      material: 'FEATHER'
      name: '&cSoltar'
      lore:
        - '&cVocê não pode soltar esse jogador.'
    release-permission:
      material: 'FEATHER'
      name: '&cSoltar'
      lore:
        - '&cVocê não tem permissão para soltar.'
    increase:
      material: 'BARRIER'
      name: '&aAumentar Pena'
      lore:
        - ''
        - '&8 > &2$&a{money_increase} coins &fp/ aumentar &8(&f{increase_time}&8)'
        - ''
        - '&aClique para aumentar a pena.'
    increase-no:
      material: 'BARRIER'
      name: '&cAumentar Pena'
      lore:
        - '&cVocê não pode aumentar a pena desse jogador.'
    increase-already:
      material: 'BARRIER'
      name: '&cAumentar Pena'
      lore:
        - '&cVocê já aumentou a pena desse jogador.'
    increase-permission:
      material: 'BARRIER'
      name: '&cAumentar Pena'
      lore:
        - '&cVocê não tem permissão para aumentar a pena.'
