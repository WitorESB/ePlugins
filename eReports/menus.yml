# Sistema de menus.

# Setas dos menus.
arrows:
  back:
    material: 'ARROW'
    name: '&cVoltar'
    lore: ['&7Clique para voltar ao menu anterior.']
  previous:
    material: 'ARROW'
    name: '&cAnterior'
    lore: ['&7Clique para ir à página anterior.']
  next:
    material: 'ARROW'
    name: '&aPróximo'
    lore: ['&7Clique para ir à próxima página.']

# Menu para reportar um jogador
report:
  name: '&8Reports - Reportando {player}'
  size: 27
  reported-slot: 11
  reason-slot: 13
  proof-slot: 14
  confirm-slot: 16
  items:
    reported:
      material: '{player}'
      name: '&a{player}'
      lore: [ '&7Você está reportando esse jogador.' ]
    reason:
      material: '76b1ee60e1b63665366489b543d44fa50350dd40ea6ba76ffec435af39afd12c'
      name: '&aMotivo'
      lore: [ '&7Motivo: &f{reason}', '', '&aClique para selecionar o motivo.' ]
    proof:
      material: '7f79d3addfdd6c404819a586ef81adfdf77c9f9554bc33d7a50526c40d59ef48'
      name: '&aProva'
      lore: [ '&7Prova: &f{proof}', '', '&aClique para anexar a prova.' ]
    confirm:
      material: 'e9e4bdcf172d5dc77c2bd4e37ad985399a9f2cdebf72463929ea4b666ef6f80'
      name: '&aConfirmar'
      lore: [ '&7Clique para &aconfirmar &7o reporte.' ]

# Menu de jogadores reportados
reports:
  name: '&8Reports - Reportados'
  size: 45
  slots: [ 11, 12, 13, 14, 15, 20, 21, 22, 23, 24, 29, 30, 31, 32, 33 ]
  empty-slot: 22
  previous-slot: 18
  next-slot: 26
  items:
    reporteds:
      material: '{player}'
      name: '&a{player}'
      lore:
        - '&7Informações do jogador reportado:'
        - ''
        - '&7Vezes reportado: &a{amount}'
        - '&7Último reporte em: &a{data} &8- &a{hora}'
        - ''
        - '&7Botão &fESQUERDO &7Para teleportar ao jogador.'
        - '&7Botão &fDIREITO &7Para ver quem reportou e as provas.'
        - '&7Botão &fQ &7Para deletar o reporte.'
    empty:
      material: 'WEB'
      name: '&cVazio...'
      lore: [ '&7Nenhum jogador reportado :c' ]

# Menu para ver quem reportou e as provas
proofs:
  name: '&8Reports - Informações de {player}'
  size: 54
  slots: [ 11, 12, 13, 14, 15, 20, 21, 22, 23, 24, 29, 30, 31, 32, 33 ]
  previous-slot: 18
  next-slot: 26
  back-slot: 49
  items:
    reporter:
      material: '{player}'
      name: '&aReportado por &f{player}'
      lore:
        - ''
        - '&7Motivo: &f{reason}'
        - '&7Prova: &f{proof}'
        - ''
        - '&aClique para copiar a prova.'

# Menu para colocar um motivo no reporte
reasons:
  name: '&8Reports - Motivo'
  size: 54
  slots: [ 11, 13, 15 ]
  previous-slot: 27
  next-slot: 35
  back-slot: 49
  others-slot: 31
  items:
    others:
      reason: '{other}'
      material: '333dcfb4da10177264968b449e724adebee3bc33b72bae85842b4aab9bd9c4db'
      name: '&aOutros'
      lore:
        - '&7Clique para escolher outro motivo'
        - '&7para reportar &f{player}'
      # Ações que são executadas com um valor de reporte
      # deste mesmo motivo
      # quantia,comando
      actions:
        - '1,alert &cO jogador &f{player} &cfoi reportado!'
    1:
      reason: 'Uso de Hack'
      material: '3c0dae47a7675ba073d7ef55741f0fa5cce8b634e00ace65451c5576c27acc78'
      name: '&aUso de Hack'
      lore:
        - '&7Clique para reportar o jogador'
        - '&f{player} &7por &fUso de Hack.'
      actions: ['']
    2:
      reason: 'Ofensa à Jogador'
      material: 'a33f4875e72e0e40f3968ba5ad3246417ce7129d0862e65661310511e3d5e654'
      name: '&aOfensa à Jogador'
      lore:
        - '&7Clique para reportar o jogador'
        - '&f{player} &7por &fOfensa à Jogador.'
      actions: ['']
    3:
      reason: 'Anti-Jogo'
      material: '14a37e5e3a5dae6d2781faef7cd4ee98b01f0d0a4293432ab3bcba5a3bced19b'
      name: '&aAnti-Jogo'
      lore:
        - '&7Clique para reportar o jogador'
        - '&f{player} &7por &fAnti-Jogo.'
      actions: ['']
